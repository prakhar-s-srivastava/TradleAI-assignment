<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTC-USD candles (WebGL)</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0f1419;
        color: #e6edf3;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
        letter-spacing: 0.02em;
      }
      .meta {
        font-size: 0.85rem;
        opacity: 0.75;
        margin-bottom: 1rem;
      }
      .toolbar {
        width: min(960px, 100%);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 0.5rem;
      }
      .toolbar button {
        appearance: none;
        background: #21262d;
        color: #e6edf3;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 6px 12px;
        font: inherit;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease;
      }
      .toolbar button:hover {
        background: #30363d;
        border-color: #484f58;
      }
      .toolbar button:active {
        background: #1c2128;
      }
      .chart-wrap {
        position: relative;
        width: min(960px, 100%);
        overflow: hidden;
        border-radius: 8px;
      }
      .chart-wrap canvas {
        width: 100%;
        height: 520px;
        display: block;
        border-radius: 8px;
        border: 1px solid #30363d;
        background: #161b22;
        cursor: grab;
        touch-action: none;
      }
      #axis-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
        font-variant-numeric: tabular-nums;
      }
      #axis-overlay .axis-y {
        position: absolute;
        left: 6px;
        transform: translateY(-50%);
        font-size: 11px;
        line-height: 1;
        color: #8b949e;
        white-space: nowrap;
      }
      #axis-overlay .axis-vol-y {
        position: absolute;
        left: 6px;
        transform: translateY(-50%);
        font-size: 10px;
        line-height: 1;
        color: #7d8590;
        white-space: nowrap;
      }
      #axis-overlay .axis-x {
        position: absolute;
        font-size: 10px;
        line-height: 1;
        color: #8b949e;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Loading…</h1>
    <p class="meta" id="meta"></p>
    <div class="toolbar">
      <button id="download-json" type="button">Download JSON</button>
      <button id="randomize" type="button">Randomize</button>
    </div>
    <div class="chart-wrap">
      <canvas id="chart" width="960" height="480"></canvas>
      <div id="axis-overlay" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
