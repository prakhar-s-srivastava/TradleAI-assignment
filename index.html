<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BTC-USD candles (WebGL)</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0f1419;
        color: #e6edf3;
        font-family: system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.1rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
        letter-spacing: 0.02em;
      }
      .meta {
        font-size: 0.85rem;
        opacity: 0.75;
        margin-bottom: 1rem;
      }
      canvas {
        width: min(960px, 100%);
        height: 480px;
        display: block;
        border-radius: 8px;
        border: 1px solid #30363d;
        background: #161b22;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Loading…</h1>
    <p class="meta" id="meta"></p>
    <canvas id="chart" width="960" height="480"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
